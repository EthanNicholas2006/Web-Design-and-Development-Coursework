<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Feedback Form</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/feedback.css" />
  </head>
  <body>
    <header>
      <nav>
        <img class="logo" src="assets/logo.jpg" alt="logo" />
        <ul>
          <li><a href="home.html">Home</a></li>
          <li><a href="volunteer.html">Volunteer</a></li>
          <li><a href="table.html">Table</a></li>
          <li><a href="profile.html">Profile</a></li>
          <li><a href="sitemap.html">Sitemap</a></li>
          <li><a href="feedback.html" class="active">Feedback</a></li>
          <li><a href="team.html">Team</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="container">
    <h2>Drop Us A Feedback</h2>
    <form>
      <fieldset>
        <legend>Personal Details</legend>
        <div>
          <label for="name">Full Name: </label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your full name"
          />
        </div>
        <br />
        <div>
          <label for="email">Email Address: </label>
          <input
            type="text"
            id="email"
            name="email"
            placeholder="Enter your email"
          />
        </div>
        <br />
        <div>
          <label for="num">Telephone Number: </label>
          <input
            type="text"
            id="num"
            name="num"
            placeholder="Enter your number"
          />
        </div>
        <br />
        <div>
          <label for="address">Address: </label>
          <textarea
            id="address"
            name="address"
            row="3"
            cols="40"
            placeholder="Enter your address"
          ></textarea>
        </div>
        <br />
      </fieldset>
      <br />
      <fieldset>
        <legend>Feedback Details</legend>
        <div>
          <label for="comment">Your Comment: </label>
          <textarea
            id="comment"
            name="comment"
            maxlength="200"
            row="5"
            cols="50"
            placeholder="Type your comment"
          ></textarea>
        </div>
        <br />
        <label for="interests">What services did you use? : </label>
        <select id="interests" name="interests" multiple size="4">
          <option value="Consultation">Consultation</option>
          <option value="Marketing">Marketing</option>
          <option value="Product Purchase">Product Purchase</option>
          <option value="Customer support">Customer Support</option>
        </select>
        <br />
        <br />
        <label for="date">Schedule a Feedback session : </label>
        <input type="date" id="date" name="date" />
      </fieldset>
      <br />
      <fieldset>
        <legend>Rate Our Services</legend>
        <br />
        <label for="service">Where did you find about about us? :</label>
        <input list="sources" id="service" name="service" />
        <datalist id="sources">
          <option value="Google"></option>
          <option value="Friend"></option>
          <option value="Advertisement"></option>
          <option value="Other"></option>
        </datalist>

        <br />
        <br />
        <label>Rate Our Service:</label>
        😡 🙁 😐 😀 🤩<br /><br />

        <label>Would you recommend us to others?</label>
        <input type="radio" id="yes" name="recommend" value="yes" required />
        <label for="yes">Yes</label>
        <input type="radio" id="no" name="recommend" value="no" />
        <label for="no">No</label>
        <br />
      </fieldset>
      <br />
      <fieldset>
        <legend>Additional Info</legend>
        <div>
          <label for="updates"
            >Would you like to recive updates and offers via E-Mail? :
          </label>
          <input type="radio" id="yes" name="recommend" value="yes" required />
          <label for="yes">Yes</label>
          <input type="radio" id="no" name="recommend" value="no" />
          <label for="no">No</label>
          <br />
          <br />
          <label for="file">Upload a Photo or PDF File:</label>
          <input
            type="file"
            id="file"
            name="file"
            accept=".jpg, .jpeg, .png, .pdf"
          />
        </div>
      </fieldset>
      <br />
      <input type="submit" value="Submit" />
      <br />
    </form>
      </div>
    </main>
    <footer>
      <p>&copy; 2025 Life on Land<a href="pageEditor_ST2.html"> | Gavesh</a></p>
    </footer>
    </footer>
  </body>
</html>
